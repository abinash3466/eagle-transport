<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Eagle Transport{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="site-header">
        <div class="container nav-wrap">
            <a href="/" class="brand">
                Eagle <span>Transport</span>
            </a>

            <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open menu">☰</button>

            <nav class="nav" id="mobileNav">
                <a href="/">Home</a>
                <a href="{{ url_for('trucks_page') }}">Trucks</a>
                <a href="{{ url_for('owner_login') }}">Owner</a>
                <a href="{{ url_for('driver_login') }}">Driver</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </nav>
        </div>
    </header>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
