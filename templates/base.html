<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Eagle Transport{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="base-navbar">
        <div class="base-nav-left">
            <a href="/" class="base-brand-wrap">
                <img src="{{ url_for('static', filename='images/eagle-logo.png') }}" alt="Eagle Transport Logo" class="base-logo">
                <div class="base-brand-text">
                    <h2>Eagle Transport</h2>
                    <p>Safe. Fast. Trusted.</p>
                </div>
            </a>
        </div>

        <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open menu">☰</button>

        <nav class="base-nav-links" id="mobileNav">
            <a href="/" class="{% if request.path == '/' %}active-link{% endif %}">Home</a>
            <a href="{{ url_for('trucks_page') }}" class="{% if request.path == url_for('trucks_page') %}active-link{% endif %}">Trucks</a>
            <a href="{{ url_for('owner_login') }}" class="{% if request.path == url_for('owner_login') or request.path == url_for('owner_dashboard') %}active-link{% endif %}">Owner</a>
            <a href="{{ url_for('driver_login') }}" class="{% if request.path == url_for('driver_login') or request.path == url_for('driver_app') %}active-link{% endif %}">Driver</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </header>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
